<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="ce site est une application web de meteo permettant de voir le climat dans un lieu donne">
    <title>meteo_page</title>
    <link rel="shortcut icon" href="./image/Weather.jpeg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montaga&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../frontend/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body
    class="w-full h-screen bg-[url('../frontend/image/ciel.jpg')] bg-no-repeat bg-cover bg-top font-[montaga] overflow-x-hidden"
    id="corps">
    <div class="w-full bg-black/70 h-screen">

        <div class="w-full bg-white">
            <h1
                class=" w-fit bg-clip-text  text-transparent bg-linear-to-r from-blue-700 to-blue-200 font-bold text-2xl p-2 sm:p-4 sm:text-3xl cursor-pointer" id="meteo">
                METEO 237</h1>
            <hr class="text-gray-500">
            
        </div>

        <div class=" mt-24 sm:mt-48">
            <div class="flex flex-col items-center justify-center gap-4 sm:gap-8">
                
           <!-- titre -->

                <h1 class="text-white text-wrap text-4xl sm:text-6xl md:text-7xl font-bold text-center w-[80%]">Trouver
                    la Météo d'une ville</h1>
            
                    <!-- text -->

                <div class="">
                    <p class="text-(--text-color) text-xl sm:text-4xl text-center" id="texte">Saisissez le nom
                        d'une ville pour
                        afficher les prévisions actuelles</p>
                </div>

                 <!-- input avec icon -->

                <div class="relative pl-4">
                    <input type="text" placeholder="Rechercher..."
                        class="bg-(--bg-color) border w-[90vw] h-[5vh] sm:w-[52vw]  sm:h-[5vh] sm:bg-(--bg-color) rounded-full pl-4 outline-blue-200 border-white" id="Search">
                    <i class="fa-brands fa-sistrix -translate-x-8  text-gray-500"></i>
                </div>

                <!-- bouton de soumission de la recherche -->

                <button type="submit" class="w-[30%] h-[5vh] sm:w-[10%] border rounded-xl bg-blue-700 text-white font-bold hover:scale-105 cursor-pointer" id="btn">Search</button>


            </div>

        </div>
    <script src="../frontend/script.js"></script>
</body>

</html>
